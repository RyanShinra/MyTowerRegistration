services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=mytower;Username=postgres;Password=${DB_PASSWORD}
    depends_on:
      - db

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: mytower
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"